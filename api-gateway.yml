server:
  port: 8080 

spring:
  cloud:
    gateway:
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins: "http://localhost:5173"
            allowedMethods: "*"
            allowedHeaders: "*"
      routes:
        - id: recruiter-service
          uri: lb://RECRUITER-SERVICE
          predicates:
            - Path=/api/v1/**

# Tells the Gateway how to find Eureka
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
