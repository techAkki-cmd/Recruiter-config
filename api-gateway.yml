server:
  port: 8080 

spring:
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins: "http://localhost:5173"
            allowedMethods: "*"
            allowedHeaders: "*"
      routes:
        # Route 1: Authentication Endpoints
        - id: recruiter-service-auth
          uri: lb://RECRUITER-SERVICE 
          predicates:
            - Path=/api/v1/auth/**

        # Route 2: Recruiter Data Endpoints
        - id: recruiter-service-data
          uri: lb://RECRUITER-SERVICE 
          predicates:
            - Path=/api/v1/recruiters/**
            
        # Route 3: Job & Resume Endpoints
        - id: job-service
          uri: lb://JOB-SERVICE 
          predicates:
            - Path=/api/v1/jobs/** # 🔥 NEW Route 4: Recruiter Service Swagger Docs
        - id: recruiter-service-swagger
          uri: lb://RECRUITER-SERVICE
          predicates:
            - Path=/recruiter-service/v3/api-docs/**
          filters:
            - RewritePath=/recruiter-service/(?<segment>.*), /${segment}

        # 🔥 NEW Route 5: Job Service Swagger Docs
        - id: job-service-swagger
          uri: lb://JOB-SERVICE
          predicates:
            - Path=/job-service/v3/api-docs/**
          filters:
            - RewritePath=/job-service/(?<segment>.*), /${segment}

# 🔥 NEW: Swagger Aggregation Config
springdoc:
  swagger-ui:
    urls:
      - name: Recruiter Auth Service
        url: /recruiter-service/v3/api-docs
      - name: Job & AI Service
        url: /job-service/v3/api-docs

eureka:
  client:
    service-url:
      defaultZone: http://discovery-server:8761/eureka/

management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    gateway:
      enabled: true
