server:
  port: 8080 

spring:
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true   # 🔥 ADD THIS
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins: "http://localhost:5173"
            allowedMethods: "*"
            allowedHeaders: "*"
      routes:
        - id: recruiter-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/v1/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
